name: Build & Release

on:
  push:
    tags:
      - 'v*'   # Triggers on tags like v0.1.1, v0.2.0, v1.0.0

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # Needed to create GitHub Releases and upload assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package installer (Windows)
        run: npx electron-builder --win nsis --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
